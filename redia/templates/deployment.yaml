apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis 
  namespace: roboshop 
  # these are replica set labels
  labels:
    project: roboshop
    component: redis
    tier: db 
spec:
  replicas: 1
  selector:
  # these labels are used to select the pods
    matchLabels:
      project: roboshop 
      component: redis 
      tier: db 
  # pod defination
  template: 
    metadata:
      labels:
        project: roboshop
        component: redis
        tier: db 
    spec:
      containers:
      - name: redis
        image: redis:{{ .Values.deployment.imageVersion }}
        imagePullPolicy: Always 
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket: 
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 5