apiVersion: v1
kind: ConfigMap
metadata:
  name: payment
  namespace: roboshop
data:
  CART_HOST: {{ .Values.configmap.CART_HOST }}
  CART_PORT: {{ .Values.configmap.CART_PORT }}
  USER_HOST: {{ .values.configmap.USER_HOST }}
  USER_PORT: {{ .Values.configmap.USER_PORT }}
  AMQP_HOST: {{ .Values.configmap.AMQP_HOST }}
  AMQP_USER: {{ .Values.configmap.AMQP_USER }}
  AMQP_PASS: {{ .Values.configmap.AMQP_PASS }}
---
apiVersion: apps/v1 
kind: Deployment
metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    component: payment
    tier: backend 
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: payment
      tier: backend 
  template:
    metadata:
      labels:
        project: roboshop
        component: payment
        tier: backend
    spec:
      containers:
      - name: payment
        image: "{{ .Values.deployment.imageRepo }}:{{ .Values.deployment.imageVersion }}"
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: payment
        ports:
        - name: liveness-port
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata: 
  name: payment
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: payment
    tier: backend
  ports:
   - protocol: TCP
     port: {{ .Values.service.servicePort }} # service port
     targetPort: 8080 # container port

