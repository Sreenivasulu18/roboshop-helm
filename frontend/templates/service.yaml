apiVersion: v1
kind: Service
metadata: 
  name: frontend
  namespace: roboshop
spec:
  type: {{ .Values.service.type }}
  selector:
    project: roboshop
    component: frontend
    tier: frontend
  ports:
   - protocol: TCP
     port: {{ .Values.service.servicePort }} # service port
     targetPort: 80 # container port
     nodePort: 30007